name: Deploy to VPS

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - beta

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy Production
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/insuweb/prod"
            PORT="3000"
            CONTAINER_NAME="insuweb_prod"
            COMMIT_SHA="${{ github.sha }}"

            echo "Deploying PRODUCTION commit $COMMIT_SHA"

            cd $APP_DIR
            git fetch origin
            git checkout --force $COMMIT_SHA

            docker build -t $CONTAINER_NAME .
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              -p 127.0.0.1:$PORT:3000 \
              --restart always \
              $CONTAINER_NAME

            echo "Production deploy completed"

  deploy-beta:
    name: Deploy Beta
    if: github.ref_name == 'beta'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy beta via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/insuweb/beta"
            PORT="3001"
            CONTAINER_NAME="insuweb_beta"
            COMMIT_SHA="${{ github.sha }}"

            echo "Deploying BETA commit $COMMIT_SHA"

            cd $APP_DIR
            git fetch origin
            git checkout --force $COMMIT_SHA

            docker build -t $CONTAINER_NAME .
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              -p 127.0.0.1:$PORT:3000 \
              --restart always \
              $CONTAINER_NAME

            echo "Beta deploy completed"